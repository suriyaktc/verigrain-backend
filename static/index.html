<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriGrain | Elite Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #D4AF37; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .gold-gradient { background: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #AA771C); color: black; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transition: 0.3s; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-yellow-900/30 glass flex justify-between items-center sticky top-0 z-50">
        <h1 class="font-sync text-xl font-bold tracking-widest">VERIGRAIN <span class="text-[10px] text-gray-500 block">QUANTUM_COMMAND_V3</span></h1>
        <div class="text-right"><p class="text-[10px] text-gray-500 uppercase">System Status</p><p class="text-xs font-bold text-green-500">ENCRYPTED_LINK</p></div>
    </nav>

    <main class="max-w-6xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="glass p-8 rounded-3xl">
            <h2 class="font-sync text-sm mb-6 uppercase tracking-widest">I. Crop Diagnostic</h2>
            <div class="space-y-4">
                <input id="farmerName" type="text" placeholder="AUTHORIZATION_NAME" class="w-full bg-black/50 border border-yellow-900/30 p-4 rounded-xl focus:outline-none focus:border-yellow-500 text-sm">
                <input id="imageFile" type="file" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-yellow-900/20 file:text-yellow-500 hover:file:bg-yellow-900/40">
                <button onclick="analyzeCrop()" class="w-full gold-gradient font-sync text-[10px] py-4 rounded-xl font-bold tracking-widest btn-hover">INITIATE SCAN</button>
            </div>
            <div id="aiResult" class="mt-8 hidden border-t border-yellow-900/20 pt-6"></div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h2 class="font-sync text-sm mb-6 uppercase tracking-widest">II. Logistics Optimizer</h2>
            <button onclick="runQuantum()" class="w-full border border-yellow-600/40 text-yellow-500 font-sync text-[10px] py-4 rounded-xl hover:bg-yellow-600 hover:text-black transition tracking-widest mb-6">EXECUTE Q-SOLVER</button>
            <div id="quantumResult" class="hidden"></div>
        </div>
    </main>

    <script>
        async function analyzeCrop() {
            const name = document.getElementById('farmerName').value;
            const file = document.getElementById('imageFile').files[0];
            const resultDiv = document.getElementById('aiResult');
            if(!name || !file) return alert("Credentials/Imagery Missing");

            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = "<p class='animate-pulse text-[10px]'>DECODING SPECTRUM...</p>";

            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch(`/analyze?farmer_name=${name}`, { method: 'POST', body: formData }).then(r => r.json());
            const data = res.data;

            resultDiv.innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <img src="data:image/jpeg;base64,${data.heatmap}" class="rounded-lg border border-yellow-600/30 w-full h-32 object-cover">
                    <div class="flex flex-col justify-center">
                        <p class="text-xs text-gray-500">HEALTH_SCORE</p>
                        <p class="text-3xl font-sync">${data.health_score}%</p>
                        <p class="text-[10px] mt-2 uppercase ${data.health_score > 50 ? 'text-green-500':'text-red-500'} font-bold">${data.status}</p>
                    </div>
                </div>
                <div class="mt-4 p-3 bg-black/40 rounded-lg text-[10px] text-gray-400">
                    Weather: ${data.weather.temp} | ${data.weather.condition} | Risk: Low
                </div>
            `;
        }

        async function runQuantum() {
            const resultDiv = document.getElementById('quantumResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = "<p class='animate-pulse text-[10px]'>ENTANGLING QUBITS...</p>";

            const data = await fetch('/optimize-delivery').then(r => r.json());
            
            resultDiv.innerHTML = `
                <div class="p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-xl mb-4">
                    <p class="text-[10px] text-gray-500 font-sync">QUANTUM_ADVANTAGE</p>
                    <p class="text-2xl font-sync text-white">${data.comparison.efficiency_gain}</p>
                </div>
                <table class="w-full text-[10px] font-mono border-collapse">
                    <tr class="border-b border-yellow-900/20">
                        <td class="py-2 text-gray-500">CLASSICAL_TIME</td><td class="text-right py-2">${data.comparison.classical_time_ms}ms</td>
                    </tr>
                    <tr class="border-b border-yellow-900/20">
                        <td class="py-2 text-yellow-500">QUANTUM_TIME</td><td class="text-right py-2 text-yellow-500">${data.comparison.quantum_time_ms}ms</td>
                    </tr>
                    <tr>
                        <td class="py-2 text-green-500">CO2_REDUCTION</td><td class="text-right py-2 text-green-500">-${data.comparison.fuel_saved_liters}kg</td>
                    </tr>
                </table>
            `;
        }
    </script>
</body>
</html>
